<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Flower Recognition</title>
  <link rel="stylesheet" href="static/style.css" />

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <div class="header">
      <p class="tag">🌿 BOTANICAL AI</p>
      <h1>Flower <span>Recognition</span></h1>
      <p class="subtitle">
        Upload a photo of any flower and let our AI identify it  
        — with facts, care tips, and more.
      </p>
    </div>

    <div class="upload-box" id="uploadBox">
      <input type="file" id="fileInput" hidden />

      <div class="upload-content">
        <div class="icon">⬆️</div>
        <h3>Drop your flower photo here</h3>
        <p>or click to browse your gallery</p>
        <small>Rose • Daisy • Sunflower • Tulip • & more</small>
      </div>
    </div>

    <div id="previewSection" class="hidden">
      <img id="previewImage" alt="Flower preview" />

      <div class="buttons">
        <button onclick="reset()">Choose another</button>
      </div>
    </div>

  </div>

<script src="static/script.js"></script>
</body>
</html>
